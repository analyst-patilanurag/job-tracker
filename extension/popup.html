<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Scorer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 380px;
    background: #0f172a;
    color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    line-height: 1.5;
  }

  /* ── Header ─────────────────────────────────────── */
  .header {
    background: #1e293b;
    padding: 12px 16px;
    border-bottom: 1px solid #334155;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-icon { font-size: 18px; }
  .header-title { font-weight: 700; font-size: 14px; color: #f1f5f9; }
  .header-sub { font-size: 11px; color: #64748b; margin-left: auto; }

  /* ── Content ────────────────────────────────────── */
  .content { padding: 16px; max-height: 540px; overflow-y: auto; }

  /* ── Views ──────────────────────────────────────── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── Spinner ─────────────────────────────────────── */
  .spinner-wrap { text-align: center; padding: 32px 0; }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid #334155;
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner-msg { color: #94a3b8; font-size: 12px; }

  /* ── Job card ───────────────────────────────────── */
  .job-card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 14px;
  }
  .job-title { font-weight: 700; font-size: 14px; color: #f1f5f9; margin-bottom: 3px; }
  .job-meta { color: #94a3b8; font-size: 12px; }

  /* ── Score bar ──────────────────────────────────── */
  .score-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 12px 0 6px;
  }
  .score-track {
    flex: 1;
    height: 8px;
    background: #334155;
    border-radius: 4px;
    overflow: hidden;
  }
  .score-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
  }
  .score-fill.prime   { background: #10b981; }
  .score-fill.strong  { background: #6366f1; }
  .score-fill.explore { background: #f59e0b; }
  .score-fill.skip    { background: #ef4444; }
  .score-num { font-weight: 700; font-size: 15px; color: #f1f5f9; white-space: nowrap; }

  /* ── Badge ──────────────────────────────────────── */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .badge.prime   { background: rgba(16,185,129,0.15); color: #10b981; }
  .badge.strong  { background: rgba(99,102,241,0.15);  color: #818cf8; }
  .badge.explore { background: rgba(245,158,11,0.15);  color: #f59e0b; }
  .badge.skip    { background: rgba(239,68,68,0.15);   color: #ef4444; }

  /* ── Lists ──────────────────────────────────────── */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #64748b;
    margin: 10px 0 5px;
  }
  .match-list, .gap-list { list-style: none; }
  .match-list li, .gap-list li {
    font-size: 12px;
    color: #cbd5e1;
    padding: 2px 0;
  }

  /* ── Insight box ─────────────────────────────────── */
  .insight-box {
    background: #1e293b;
    border-left: 3px solid #6366f1;
    border-radius: 0 6px 6px 0;
    padding: 8px 10px;
    font-size: 12px;
    color: #cbd5e1;
    margin: 10px 0;
    line-height: 1.5;
  }
  .insight-box.angle { border-color: #10b981; margin-top: 6px; }

  /* ── Materials ───────────────────────────────────── */
  .material-block {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
  }
  .material-block p {
    font-size: 12px;
    color: #cbd5e1;
    margin-bottom: 6px;
    line-height: 1.6;
  }
  .summary-text {
    font-size: 12px;
    color: #cbd5e1;
    line-height: 1.6;
    margin-bottom: 8px;
  }
  .cover-text {
    font-size: 12px;
    color: #cbd5e1;
    line-height: 1.6;
    white-space: pre-wrap;
    max-height: 180px;
    overflow-y: auto;
    margin-bottom: 8px;
  }

  /* ── Buttons ─────────────────────────────────────── */
  .btn {
    display: block;
    width: 100%;
    padding: 9px 14px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    margin-bottom: 8px;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:last-child { margin-bottom: 0; }

  .btn-primary { background: #6366f1; color: #fff; }
  .btn-success { background: #10b981; color: #fff; }
  .btn-ghost {
    background: transparent;
    color: #94a3b8;
    border: 1px solid #334155;
  }
  .btn-ghost:hover { color: #e2e8f0; border-color: #475569; }
  .btn-sm {
    padding: 6px 12px;
    font-size: 12px;
    width: auto;
    display: inline-block;
    margin-bottom: 0;
  }
  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  /* ── Error ───────────────────────────────────────── */
  .error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 12px;
    color: #fca5a5;
    margin-bottom: 12px;
  }

  /* ── Toast ───────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #334155;
    color: #e2e8f0;
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 99;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Divider ─────────────────────────────────────── */
  .divider { border: none; border-top: 1px solid #1e293b; margin: 10px 0; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="header-icon">🎯</span>
  <span class="header-title">Job Scorer</span>
  <span class="header-sub">powered by Claude</span>
</div>

<div class="content">

  <!-- VIEW: Loading / not on job page -->
  <div class="view active" id="view-loading">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <div class="spinner-msg" id="loading-msg">Reading job from page…</div>
    </div>
  </div>

  <!-- VIEW: Job loaded, ready to score -->
  <div class="view" id="view-job">
    <div class="job-card">
      <div class="job-title" id="job-title"></div>
      <div class="job-meta" id="job-company"></div>
    </div>
    <button class="btn btn-primary" id="btn-score">Score This Job</button>
  </div>

  <!-- VIEW: Scoring in progress -->
  <div class="view" id="view-scoring">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <div class="spinner-msg">Scoring with Claude AI…</div>
    </div>
  </div>

  <!-- VIEW: Score results -->
  <div class="view" id="view-scored">
    <div class="job-card">
      <div class="job-title" id="scored-title"></div>
      <div class="job-meta" id="scored-company"></div>
      <div class="score-row">
        <div class="score-track"><div class="score-fill" id="score-fill"></div></div>
        <div class="score-num" id="score-value"></div>
      </div>
      <span class="badge" id="score-badge"></span>
    </div>

    <div class="section-label">Top Matches</div>
    <ul class="match-list" id="score-matches"></ul>

    <div class="section-label">Gaps</div>
    <ul class="gap-list" id="score-gaps"></ul>

    <div class="section-label">Key Insight</div>
    <div class="insight-box" id="key-insight"></div>

    <div class="section-label">Your Interview Angle</div>
    <div class="insight-box angle" id="interview-angle"></div>

    <hr class="divider">
    <button class="btn btn-success" id="btn-generate">Generate Resume + Cover Letter</button>
    <button class="btn btn-ghost" id="btn-dashboard">Open Dashboard</button>
  </div>

  <!-- VIEW: Generating in progress -->
  <div class="view" id="view-generating">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <div class="spinner-msg">Generating tailored materials…<br><br>
        <span style="color:#475569">This takes ~20 seconds</span>
      </div>
    </div>
  </div>

  <!-- VIEW: Materials ready -->
  <div class="view" id="view-materials">
    <div class="section-label">Professional Summary</div>
    <div class="material-block">
      <div class="summary-text" id="summary-text"></div>
      <div class="btn-row">
        <button class="btn btn-ghost btn-sm" id="btn-copy-summary">Copy Summary</button>
      </div>
    </div>

    <div class="section-label">Resume Bullets — AbbVie</div>
    <div class="material-block">
      <div id="bullets-text"></div>
      <div class="btn-row">
        <button class="btn btn-ghost btn-sm" id="btn-copy-bullets">Copy Bullets</button>
      </div>
    </div>

    <div class="section-label">Cover Letter</div>
    <div class="material-block">
      <div class="cover-text" id="cover-text"></div>
      <div class="btn-row">
        <button class="btn btn-ghost btn-sm" id="btn-copy-cover">Copy Cover Letter</button>
      </div>
    </div>

    <hr class="divider">
    <div class="btn-row">
      <button class="btn btn-ghost" id="btn-back" style="flex:1">← Back to Score</button>
      <button class="btn btn-primary" id="btn-dashboard-2" style="flex:1">Dashboard</button>
    </div>
  </div>

</div><!-- /content -->

<div id="toast"></div>
<script src="popup.js"></script>
</body>
</html>
